    <path d="M-60 -50 L-30 -20 L30 -20 L60 -50 Z" fill="#71717a" stroke="none"/>
    <!-- タイヤ -->
    <circle cx="-65" cy="25" r="22" fill="#27272a" stroke="none"/>
    <circle cx="65" cy="25" r="22" fill="#27272a" stroke="none"/>
    <circle cx="-65" cy="25" r="8" fill="#71717a" stroke="none"/>
    <circle cx="65" cy="25" r="8" fill="#71717a" stroke="none"/>
    <!-- ヘッドライト -->
    <circle cx="-95" cy="0" r="6" fill="#fef3c7" stroke="none"/>
    <circle cx="95" cy="0" r="6" fill="#fef3c7" stroke="none"/>
  </g>
  <text x="200" y="255" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#71717a" text-anchor="middle" letter-spacing="3">PHOTO COMING SOON</text>
</svg>
